<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LMS App Pro</title>

<style>
:root {
    --primary:#4a90e2;
    --light:#f4f4f4;
}

body { margin:0; font-family:sans-serif; background:var(--light); }
header { background:var(--primary); color:white; padding:1rem; text-align:center; }

nav { display:flex; justify-content:center; background:#fff; }
nav a { padding:1rem; cursor:pointer; }

.page { display:none; padding:20px; max-width:800px; margin:auto; }
.active { display:block; }

.card {
    background:white;
    padding:15px;
    margin:10px 0;
    border-radius:10px;
}

button {
    background:var(--primary);
    color:white;
    border:none;
    padding:8px 12px;
    border-radius:5px;
    cursor:pointer;
}

input, textarea {
    width:95%;
    padding:8px;
    margin:5px 0;
}
</style>
</head>

<body>

<header>
<h1>📚 LMS App</h1>
</header>

<!-- LOGIN -->
<section id="loginPage" class="page active">
    <div class="card">
        <h2>Login</h2>
        <input type="text" id="username" placeholder="Username">
        <select id="role">
            <option value="student">Student</option>
            <option value="admin">Admin</option>
        </select>
        <br><br>
        <button onclick="login()">Masuk</button>
    </div>
</section>

<!-- APP -->
<div id="app" style="display:none">

<nav>
    <a onclick="nav('dashboard')">Dashboard</a>
    <a onclick="nav('courses')">Materi</a>
    <a onclick="nav('my')">Belajar Saya</a>
    <a onclick="logout()">Logout</a>
</nav>

<!-- DASHBOARD -->
<section id="dashboard" class="page">
    <h2>Dashboard</h2>
    <div class="card" id="stats"></div>
</section>

<!-- ADMIN PAGE -->
<section id="courses" class="page">
    <h2>Kelola Materi</h2>

    <div id="adminOnly">
        <input id="title" placeholder="Judul">
        <textarea id="desc" placeholder="Deskripsi"></textarea>
        <button onclick="add()">Tambah</button>
    </div>

    <div id="list"></div>
</section>

<!-- STUDENT PAGE -->
<section id="my" class="page">
    <h2>Materi Saya</h2>
    <div id="myList"></div>
</section>

</div>

<script>
let user = null;
const DB = "lms_data";

// LOGIN
function login(){
    const name = document.getElementById("username").value;
    const role = document.getElementById("role").value;

    if(!name) return alert("Isi username");

    user = {name, role};
    localStorage.setItem("user", JSON.stringify(user));

    startApp();
}

// START APP
function startApp(){
    user = JSON.parse(localStorage.getItem("user"));
    document.getElementById("loginPage").style.display="none";
    document.getElementById("app").style.display="block";

    nav('dashboard');
}

// NAV
function nav(id){
    document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
    document.getElementById(id).classList.add("active");

    if(id==='dashboard') loadStats();
    if(id==='courses') loadCourses();
    if(id==='my') loadMy();
}

// DATA
function getData(){
    return JSON.parse(localStorage.getItem(DB)||"[]");
}

function saveData(data){
    localStorage.setItem(DB, JSON.stringify(data));
}

// ADMIN ADD
function add(){
    const title = document.getElementById("title").value;
    const desc = document.getElementById("desc").value;

    if(!title || !desc) return alert("Isi semua");

    const data = getData();
    data.push({title, desc, done:false});
    saveData(data);

    loadCourses();
}

// LOAD COURSES
function loadCourses(){
    const data = getData();
    const list = document.getElementById("list");

    document.getElementById("adminOnly").style.display =
        user.role === "admin" ? "block":"none";

    list.innerHTML = data.map((d,i)=>`
        <div class="card">
            <b>${d.title}</b>
            <p>${d.desc}</p>
            ${user.role==="admin" ?
            `<button onclick="del(${i})">Hapus</button>` : ""}
        </div>
    `).join("");
}

// DELETE
function del(i){
    const data = getData();
    data.splice(i,1);
    saveData(data);
    loadCourses();
}

// STUDENT
function loadMy(){
    const data = getData();
    const list = document.getElementById("myList");

    list.innerHTML = data.map((d,i)=>`
        <div class="card">
            <b>${d.title}</b>
            <p>${d.desc}</p>
            <button onclick="toggle(${i})">
                ${d.done ? "✔ Selesai" : "Tandai Selesai"}
            </button>
        </div>
    `).join("");
}

function toggle(i){
    const data = getData();
    data[i].done = !data[i].done;
    saveData(data);
    loadMy();
}

// DASHBOARD
function loadStats(){
    const data = getData();
    const done = data.filter(d=>d.done).length;

    document.getElementById("stats").innerHTML = `
        <p>Total Materi: ${data.length}</p>
        <p>Selesai: ${done}</p>
    `;
}

// LOGOUT
function logout(){
    localStorage.removeItem("user");
    location.reload();
}

// AUTO LOGIN
if(localStorage.getItem("user")){
    startApp();
}
</script>

</body>
</html>
